<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Smart Desk AR</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.0/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: #000;
    }

    a-scene {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }

    .a-canvas {
      position: fixed !important;
      top: 0; left: 0;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── UI OVERLAY ─────────────────────────────────────── */
    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* Header */
    #header {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: linear-gradient(135deg, #1a237ecc, #00bcd4cc);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(10px);
    }

    #header .logo {
      width: 36px; height: 36px;
      background: white;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    #header h1 { color: white; font-size: 18px; font-weight: 700; }
    #header p  { color: rgba(255,255,255,0.75); font-size: 11px; }

    /* Progress bar */
    #progress-bar {
      position: absolute;
      top: 64px; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.1);
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00bcd4, #1a237e);
      width: 0%;
      transition: width 1s ease;
    }

    /* Viewfinder corner brackets */
    #corner-frame {
      position: absolute;
      top: 70px; left: 20px; right: 20px; bottom: 80px;
      pointer-events: none;
    }
    #corner-frame::before, #corner-frame::after,
    #corner-frame .c2::before, #corner-frame .c2::after {
      content: '';
      position: absolute;
      width: 30px; height: 30px;
      border-color: #00bcd4;
      border-style: solid;
    }
    #corner-frame::before      { top:0;    left:0;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    #corner-frame::after       { bottom:0; right:0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    #corner-frame .c2::before  { top:0;    right:0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    #corner-frame .c2::after   { bottom:0; left:0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }

    /* Scan hint — tampil saat marker BELUM terdeteksi */
    #scan-hint {
      position: absolute;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26,35,126,0.88);
      color: white;
      padding: 16px 28px;
      border-radius: 30px;
      text-align: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0,188,212,0.4);
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.3s;
    }
    #scan-hint .scan-icon {
      font-size: 30px;
      display: block;
      margin-bottom: 6px;
      animation: pulse 2s infinite;
    }
    #scan-hint p { font-size: 13px; }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.12); opacity: 0.7; }
    }

    /* ── AR BUTTONS — tampil saat marker TERDETEKSI ──── */
    #ar-buttons {
      position: absolute;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      display: none;               /* disembunyikan sampai markerFound */
      flex-direction: column;
      align-items: center;
      gap: 12px;
      pointer-events: all;
    }

    #ar-buttons.visible {
      display: flex;
      animation: slideUp 0.35s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0);    }
    }

    /* Label "Marker terdeteksi" */
    #ar-detected-label {
      background: rgba(0,188,212,0.15);
      border: 1px solid rgba(0,188,212,0.5);
      color: #00bcd4;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #ar-detected-label .dot {
      width: 7px; height: 7px;
      background: #00e676;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.2; }
    }

    /* Row 3 tombol navigasi */
    #ar-btn-row {
      display: flex;
      gap: 10px;
      background: rgba(10,14,39,0.90);
      padding: 14px 18px;
      border-radius: 20px;
      border: 1px solid rgba(0,188,212,0.25);
      backdrop-filter: blur(18px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .ar-nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      color: white;
      text-decoration: none;
      cursor: pointer;
      min-width: 76px;
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    .ar-nav-btn:active,
    .ar-nav-btn:hover {
      background: rgba(0,188,212,0.22);
      border-color: #00bcd4;
      transform: translateY(-2px);
    }

    .ar-nav-btn .btn-icon { font-size: 26px; }
    .ar-nav-btn .btn-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.85);
    }
    .ar-nav-btn .btn-sub {
      font-size: 9px;
      color: #00bcd4;
      margin-top: -4px;
    }

    /* Warna aksen tiap tombol */
    .ar-nav-btn.btn-slides { border-color: rgba(229,57,53,0.3); }
    .ar-nav-btn.btn-slides:active { background: rgba(229,57,53,0.2); border-color: #e53935; }

    .ar-nav-btn.btn-video  { border-color: rgba(21,101,192,0.3); }
    .ar-nav-btn.btn-video:active  { background: rgba(21,101,192,0.2); border-color: #1565c0; }

    .ar-nav-btn.btn-quiz   { border-color: rgba(0,137,123,0.3); }
    .ar-nav-btn.btn-quiz:active   { background: rgba(0,137,123,0.2); border-color: #00897b; }

    /* Toast */
    #toast {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.88);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
      border: 1px solid rgba(0,188,212,0.4);
    }
    #toast.show { opacity: 1; }

    /* Bottom fallback menu — selalu tampil */
    #menu-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(135deg, #1a237eee, #0d47a1ee);
      backdrop-filter: blur(15px);
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      justify-content: center;
      border-top: 1px solid rgba(0,188,212,0.25);
      pointer-events: all;
    }

    .menu-btn {
      flex: 1;
      max-width: 90px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6);
      padding: 8px 6px;
      border-radius: 10px;
      text-align: center;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.3px;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-btn .icon { font-size: 16px; }
    .menu-btn:active { background: rgba(0,188,212,0.2); color: white; }
  </style>
</head>
<body>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    loading-screen="enabled: false"
  >

    <a-marker preset="hiro" id="main-marker">

      <!-- Semua objek 3D murni visual — navigasi kini via tombol HTML overlay -->
      <a-entity id="desk-group" position="0 0 0" scale="0.5 0.5 0.5">

        <!-- Meja -->
        <a-box position="0 0.6 0" width="2.2" height="0.08" depth="1.4" color="#1a237e"></a-box>
        <a-box position="-0.9 0.3 -0.55" width="0.08" height="0.6" depth="0.08" color="#0d47a1"></a-box>
        <a-box position=" 0.9 0.3 -0.55" width="0.08" height="0.6" depth="0.08" color="#0d47a1"></a-box>
        <a-box position="-0.9 0.3  0.55" width="0.08" height="0.6" depth="0.08" color="#0d47a1"></a-box>
        <a-box position=" 0.9 0.3  0.55" width="0.08" height="0.6" depth="0.08" color="#0d47a1"></a-box>
        <a-box position="0 0.645 0" width="2.22" height="0.01" depth="1.42" color="#00bcd4" opacity="0.6"></a-box>

        <!-- Buku (visual saja) -->
        <a-entity position="-0.7 0.8 0">
          <a-box width="0.25" height="0.32" depth="0.06" color="#e53935"></a-box>
          <a-box position="0.02 0 0.04"     width="0.22" height="0.29"   depth="0.01"  color="#fff9c4"></a-box>
          <a-box position="0.02  0.05 0.045" width="0.14" height="0.008" depth="0.005" color="#bdbdbd"></a-box>
          <a-box position="0.02  0    0.045" width="0.14" height="0.008" depth="0.005" color="#bdbdbd"></a-box>
          <a-box position="0.02 -0.05 0.045" width="0.14" height="0.008" depth="0.005" color="#bdbdbd"></a-box>
          <a-text value="SLIDES"    position="0 -0.26 0" align="center" color="white"   width="1.5"></a-text>
          <a-text value="Materi AR" position="0 -0.33 0" align="center" color="#00bcd4" width="1.2"></a-text>
        </a-entity>

        <!-- Poster/Video (visual saja) -->
        <a-entity position="0 0.8 0">
          <a-box width="0.28" height="0.36" depth="0.03" color="#1565c0"></a-box>
          <a-box  position="0 0 0.02" width="0.24" height="0.30" depth="0.01" color="#0d0d0d"></a-box>
          <a-cone position="0 0 0.03" rotation="0 0 -90" radius-bottom="0.07" height="0.10" color="#00bcd4"></a-cone>
          <a-text value="VIDEO"       position="0 -0.26 0" align="center" color="white"   width="1.5"></a-text>
          <a-text value="Tutorial AR" position="0 -0.33 0" align="center" color="#00bcd4" width="1.2"></a-text>
        </a-entity>

        <!-- Tombol Kuis (visual saja) -->
        <a-entity position="0.7 0.8 0">
          <a-cylinder radius="0.14" height="0.08" color="#00897b"></a-cylinder>
          <a-text value="?"               position="0  0.12 0" align="center" color="white"   width="1.8"></a-text>
          <a-text value="KUIS"            position="0 -0.22 0" align="center" color="white"   width="1.5"></a-text>
          <a-text value="Uji Pengetahuan" position="0 -0.30 0" align="center" color="#00bcd4" width="1.0"></a-text>
        </a-entity>

        <a-text value="Smart Desk AR" position="0 1.15 0" align="center" color="#00bcd4" width="3"></a-text>
        <a-light type="point" position="0 1.5 0" color="#00bcd4" intensity="0.4"></a-light>

      </a-entity>

    </a-marker>

    <a-light type="ambient"     color="#ffffff" intensity="0.8"></a-light>
    <a-light type="directional" position="1 2 1" color="#ffffff" intensity="0.5"></a-light>

    <a-entity camera></a-entity>

  </a-scene>

  <!-- ── UI OVERLAY ───────────────────────────────────── -->
  <div id="ui-overlay">

    <div id="progress-bar"><div id="progress-fill"></div></div>

    <div id="header">
      <div class="logo">🎯</div>
      <div>
        <h1>Smart Desk AR</h1>
        <p id="header-sub">Arahkan kamera ke marker Hiro</p>
      </div>
    </div>

    <div id="corner-frame"><div class="c2" style="position:absolute;inset:0;"></div></div>

    <!-- Tampil saat marker BELUM terdeteksi -->
    <div id="scan-hint">
      <span class="scan-icon">📷</span>
      <p>Scan marker Hiro untuk melihat meja virtual</p>
    </div>

    <!-- Tampil saat marker TERDETEKSI -->
    <div id="ar-buttons">
      <div id="ar-detected-label">
        <span class="dot"></span>
        Meja AR Terdeteksi — Pilih Aktivitas
      </div>
      <div id="ar-btn-row">
        <a href="slides.html" class="ar-nav-btn btn-slides">
          <span class="btn-icon">📚</span>
          <span class="btn-label">SLIDES</span>
          <span class="btn-sub">Materi AR</span>
        </a>
        <a href="video.html" class="ar-nav-btn btn-video">
          <span class="btn-icon">🎬</span>
          <span class="btn-label">VIDEO</span>
          <span class="btn-sub">Tutorial AR</span>
        </a>
        <a href="quiz.html" class="ar-nav-btn btn-quiz">
          <span class="btn-icon">🎯</span>
          <span class="btn-label">KUIS</span>
          <span class="btn-sub">Uji Pengetahuan</span>
        </a>
      </div>
    </div>

    <div id="toast"></div>

    <!-- Bottom fallback — selalu bisa diakses -->
    <div id="menu-panel">
      <a href="slides.html" class="menu-btn"><span class="icon">📚</span><span>SLIDES</span></a>
      <a href="video.html"  class="menu-btn"><span class="icon">🎬</span><span>VIDEO</span></a>
      <a href="quiz.html"   class="menu-btn"><span class="icon">🎯</span><span>KUIS</span></a>
    </div>

  </div>

  <script>
    // ── Toast ─────────────────────────────────────────────
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._tid);
      t._tid = setTimeout(function () { t.classList.remove('show'); }, 2500);
    }

    // ── Progress bar ──────────────────────────────────────
    (function () {
      var done = [
        localStorage.getItem('slides_session_3_done') === 'true',
        localStorage.getItem('video_session_3_done')  === 'true',
        localStorage.getItem('quiz_session_3_done')   === 'true'
      ].filter(Boolean).length;
      document.getElementById('progress-fill').style.width = (done / 3 * 100) + '%';
    })();

    // ── Marker show/hide logic ────────────────────────────
    var scanHint  = document.getElementById('scan-hint');
    var arButtons = document.getElementById('ar-buttons');
    var headerSub = document.getElementById('header-sub');

    function showButtons() {
      scanHint.style.display  = 'none';
      arButtons.classList.add('visible');
      headerSub.textContent   = 'Marker terdeteksi ✓';
    }

    function hideButtons() {
      arButtons.classList.remove('visible');
      scanHint.style.display  = '';
      headerSub.textContent   = 'Arahkan kamera ke marker Hiro';
    }

    var marker = document.getElementById('main-marker');
    marker.addEventListener('markerFound', function () {
      showButtons();
      showToast('Meja AR muncul! Pilih aktivitas di bawah');
    });
    marker.addEventListener('markerLost', function () {
      hideButtons();
    });
  </script>
</body>
</html>
