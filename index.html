<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Smart Desk AR</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.0/aframe/build/aframe-ar.js"></script>
  <style>
    :root {
      --primary: #1a237e; --secondary: #0d47a1;
      --accent: #00bcd4;  --accent2: #0097a7;
      --bg: #0a0e27;      --card: #111638;
      --text: #e8eaf6;    --muted: #90a4ae;
      --success: #00e676; --error: #ff5252; --warn: #ffd740;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; font-family:'Segoe UI',sans-serif; background:#000; }

    a-scene {
      position:fixed; top:0; left:0;
      width:100vw; height:100vh; z-index:0;
    }
    .a-canvas {
      position:fixed !important; top:0; left:0;
      width:100% !important; height:100% !important;
    }

    /* ── UI OVERLAY ────────────────────────────────── */
    #ui-overlay {
      position:fixed; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:999;
    }
    #header {
      position:absolute; top:0; left:0; right:0;
      background:linear-gradient(135deg,#1a237ecc,#00bcd4cc);
      padding:12px 20px; display:flex; align-items:center; gap:12px;
      backdrop-filter:blur(10px);
    }
    #header .logo {
      width:36px; height:36px; background:white; border-radius:8px;
      display:flex; align-items:center; justify-content:center; font-size:18px;
    }
    #header h1 { color:white; font-size:18px; font-weight:700; }
    #header p  { color:rgba(255,255,255,.75); font-size:11px; }

    #progress-bar { position:absolute; top:64px; left:0; right:0; height:3px; background:rgba(255,255,255,.1); }
    #progress-fill { height:100%; background:linear-gradient(90deg,#00bcd4,#1a237e); width:0%; transition:width 1s; }

    #corner-frame { position:absolute; top:70px; left:20px; right:20px; bottom:80px; pointer-events:none; }
    #corner-frame::before,#corner-frame::after,
    #corner-frame .c2::before,#corner-frame .c2::after {
      content:''; position:absolute; width:30px; height:30px;
      border-color:#00bcd4; border-style:solid;
    }
    #corner-frame::before     { top:0;    left:0;  border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    #corner-frame::after      { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
    #corner-frame .c2::before { top:0;    right:0; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
    #corner-frame .c2::after  { bottom:0; left:0;  border-width:0 0 3px 3px; border-radius:0 0 0 4px; }

    #scan-hint {
      position:absolute; bottom:110px; left:50%; transform:translateX(-50%);
      background:rgba(26,35,126,.88); color:white; padding:16px 28px;
      border-radius:30px; text-align:center; backdrop-filter:blur(10px);
      border:1px solid rgba(0,188,212,.4); pointer-events:none; white-space:nowrap;
    }
    #scan-hint .scan-icon { font-size:30px; display:block; margin-bottom:6px; animation:pulse 2s infinite; }
    #scan-hint p { font-size:13px; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.12);opacity:.7} }

    /* ── MODEL LOADING OVERLAY ──────────────────────────── */
    #model-loading {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      background:rgba(26,35,126,.93); color:white; padding:22px 32px;
      border-radius:18px; text-align:center; backdrop-filter:blur(14px);
      border:1px solid rgba(0,188,212,.45); pointer-events:none; z-index:998;
      transition:opacity .4s;
    }
    #model-loading.hide { opacity:0; pointer-events:none; }
    #model-loading .ld-icon { font-size:34px; display:block; margin-bottom:10px; animation:pulse 1.5s infinite; }
    #model-loading p { font-size:13px; line-height:1.6; }
    #model-loading small { color:#00bcd4; font-size:11px; }
    #ld-bar { width:140px; height:4px; background:rgba(255,255,255,.12); border-radius:4px; margin:10px auto 0; overflow:hidden; }
    #ld-fill { height:100%; background:linear-gradient(90deg,#00bcd4,#1a237e); border-radius:4px; width:0%; transition:width .4s; }

    /* ── TAP ZONES ───────────────────────────────────── */
    /* Container — pointer-events:none, zona individual yang all */
    #tap-zones {
      position:absolute; top:0; left:0; right:0; bottom:0;
      display:none; pointer-events:none;
    }
    #tap-zones.active { display:block; }

    .tap-zone {
      position:absolute;
      top:28%; height:42%;
      pointer-events:all; cursor:pointer;
      display:flex; flex-direction:column;
      align-items:center; justify-content:flex-end;
      padding-bottom:6px; overflow:visible;
      -webkit-tap-highlight-color:transparent;
    }
    /* Posisi default horizontal row — sesuaikan setelah model terlihat jelas */
    #zone-video  { left:5%;  width:30%; }
    #zone-slides { left:35%; width:30%; }
    #zone-quiz   { left:65%; width:30%; }

    /* Label kecil di bawah zona */
    .zone-label {
      display:flex; flex-direction:column; align-items:center; gap:2px;
      background:rgba(0,0,0,.55); border:1px solid rgba(0,188,212,.35);
      border-radius:12px; padding:6px 10px; backdrop-filter:blur(6px);
      animation:zoneLabelIn .4s ease; pointer-events:none;
    }
    @keyframes zoneLabelIn {
      from{opacity:0;transform:translateY(8px)}
      to  {opacity:1;transform:translateY(0)}
    }
    .zone-label .zi { font-size:18px; }
    .zone-label .zt { font-size:9px; color:white; font-weight:700; letter-spacing:.4px; }
    .zone-label .zs { font-size:8px; color:#00bcd4; margin-top:-1px; }

    /* Subtle active flash on the zone background */
    .tap-zone:active::before {
      content:''; position:absolute; inset:0;
      background:rgba(0,188,212,.12); border-radius:16px;
    }

    /* Ripple */
    .ripple {
      position:fixed; border-radius:50%;
      background:rgba(0,188,212,.45); pointer-events:none;
      transform:scale(0); z-index:1000;
      animation:rippleAnim .55s ease-out forwards;
    }
    @keyframes rippleAnim {
      to { transform:scale(1); opacity:0; }
    }

    #toast {
      position:absolute; top:80px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,.88); color:white; padding:10px 20px; border-radius:20px;
      font-size:13px; opacity:0; transition:opacity .3s; pointer-events:none;
      white-space:nowrap; border:1px solid rgba(0,188,212,.4);
    }
    #toast.show { opacity:1; }

    #menu-panel {
      position:absolute; bottom:0; left:0; right:0;
      background:linear-gradient(135deg,#1a237eee,#0d47a1ee);
      backdrop-filter:blur(15px); padding:10px 16px;
      display:flex; gap:8px; justify-content:center;
      border-top:1px solid rgba(0,188,212,.25); pointer-events:all;
    }
    .menu-btn {
      flex:1; max-width:90px; background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.65);
      padding:8px 6px; border-radius:10px; text-align:center;
      text-decoration:none; display:flex; flex-direction:column;
      align-items:center; gap:3px; font-size:9px; font-weight:700;
      cursor:pointer; -webkit-tap-highlight-color:transparent;
    }
    .menu-btn .icon { font-size:16px; }
    .menu-btn:active { background:rgba(0,188,212,.2); color:white; }

    /* ══════════════════════════════════════════════════
       MODAL SYSTEM
    ══════════════════════════════════════════════════ */
    .modal {
      position:fixed; inset:0; z-index:9999;
      display:none; align-items:flex-end; justify-content:center;
      background:rgba(0,0,0,.7);
    }
    .modal.open { display:flex; }

    .modal-inner {
      background:var(--bg); width:100%; height:92vh;
      border-radius:20px 20px 0 0; overflow:hidden;
      display:flex; flex-direction:column;
      animation:modalUp .32s cubic-bezier(.22,.68,0,1.2);
      box-shadow:0 -8px 40px rgba(0,0,0,.6);
    }
    @keyframes modalUp {
      from{transform:translateY(100%); opacity:.5}
      to  {transform:translateY(0);    opacity:1}
    }

    .modal-header {
      display:flex; align-items:center; gap:12px;
      padding:16px 20px;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      border-bottom:1px solid rgba(0,188,212,.2); flex-shrink:0;
    }
    .modal-title { flex:1; color:white; font-size:17px; font-weight:700; }
    .modal-close {
      background:rgba(255,255,255,.15); border:none; color:white;
      width:34px; height:34px; border-radius:10px; font-size:16px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      -webkit-tap-highlight-color:transparent;
    }
    .modal-close:active { background:rgba(255,255,255,.3); }

    .modal-body { flex:1; overflow-y:auto; padding:16px; }
    .modal-body::-webkit-scrollbar { width:4px; }
    .modal-body::-webkit-scrollbar-track { background:transparent; }
    .modal-body::-webkit-scrollbar-thumb { background:rgba(0,188,212,.3); border-radius:4px; }

    /* ── Shared inner components ── */
    .m-session-tabs {
      display:flex; gap:8px; overflow-x:auto; margin-bottom:16px;
      scrollbar-width:none; padding-bottom:4px;
    }
    .m-session-tabs::-webkit-scrollbar { display:none; }
    .m-tab {
      flex-shrink:0; padding:7px 14px; border-radius:20px;
      border:1.5px solid rgba(255,255,255,.1); background:transparent;
      color:var(--muted); cursor:pointer; font-size:12px; font-weight:700;
      transition:all .2s; white-space:nowrap;
    }
    .m-tab.active {
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border-color:var(--accent); color:white;
    }
    .m-tab.locked { opacity:.45; cursor:not-allowed; }

    .m-progress-wrap {
      background:rgba(255,255,255,.05); border-radius:12px;
      padding:10px 14px; border:1px solid rgba(255,255,255,.07); margin-bottom:16px;
    }
    .m-progress-label { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:6px; }
    .m-progress-bar { background:rgba(255,255,255,.08); border-radius:10px; height:5px; overflow:hidden; }
    .m-progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),#26c6da); border-radius:10px; transition:width .6s; }

    .prereq-box {
      background:rgba(255,215,64,.07); border:1px solid rgba(255,215,64,.3);
      border-radius:12px; padding:12px 14px; margin-bottom:16px;
      font-size:13px; color:var(--muted); line-height:1.6;
    }
    .prereq-box strong { color:var(--warn); }
    .prereq-box a { color:var(--accent); font-weight:700; cursor:pointer; }

    /* ── SLIDES ── */
    .slide-card {
      background:var(--card); border-radius:18px; padding:20px;
      border:1px solid rgba(0,188,212,.15); position:relative;
      overflow:hidden; margin-bottom:12px;
    }
    .slide-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--accent),var(--primary)); }
    .slide-badge {
      display:inline-flex; align-items:center; gap:5px;
      background:rgba(0,188,212,.1); border:1px solid rgba(0,188,212,.3);
      color:var(--accent); padding:3px 10px; border-radius:20px;
      font-size:10px; font-weight:700; margin-bottom:12px;
    }
    .slide-num { position:absolute; top:16px; right:16px; font-size:11px; color:var(--muted); font-weight:600; }
    .slide-icon { font-size:38px; margin-bottom:10px; }
    .slide-title { font-size:18px; font-weight:800; color:white; margin-bottom:10px; line-height:1.3; }
    .slide-content { font-size:13px; color:var(--muted); line-height:1.7; }
    .slide-content strong { color:var(--accent); }
    .slide-content ul { list-style:none; margin-top:8px; padding:0; }
    .slide-content ul li { padding:5px 0 5px 20px; position:relative; border-bottom:1px solid rgba(255,255,255,.04); font-size:13px; }
    .slide-content ul li::before { content:'▶'; position:absolute; left:0; color:var(--accent); font-size:9px; top:8px; }
    .hl-box { background:rgba(0,188,212,.07); border-left:3px solid var(--accent); padding:10px 12px; border-radius:0 8px 8px 0; margin-top:10px; font-size:13px; }
    .cmp-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    .cmp-card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); border-radius:10px; padding:10px; text-align:center; }
    .cmp-card .ci { font-size:22px; margin-bottom:4px; }
    .cmp-card h4 { font-size:12px; color:white; margin-bottom:3px; }
    .cmp-card p  { font-size:11px; color:var(--muted); }

    .slide-dots { display:flex; justify-content:center; gap:5px; margin:10px 0; }
    .dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.2); cursor:pointer; transition:all .2s; }
    .dot.active { background:var(--accent); width:20px; border-radius:4px; }

    .nav-row { display:flex; gap:10px; margin-top:4px; }
    .nav-btn { flex:1; padding:13px; border-radius:13px; border:none; cursor:pointer; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:7px; transition:all .2s; -webkit-tap-highlight-color:transparent; }
    .btn-prev  { background:rgba(255,255,255,.07); color:var(--muted); border:1px solid rgba(255,255,255,.1); }
    .btn-next  { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; box-shadow:0 4px 14px rgba(0,188,212,.3); }
    .btn-done  { background:linear-gradient(135deg,#00e676,#00c853); color:#1a237e; }
    .btn-disabled { opacity:.4; cursor:not-allowed; }

    /* ── VIDEO ── */
    .vid-card { background:var(--card); border-radius:18px; overflow:hidden; border:1px solid rgba(0,188,212,.15); margin-bottom:14px; }
    .vid-wrap  { position:relative; padding-bottom:56.25%; height:0; background:#000; }
    .vid-wrap iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; }
    .vid-lock {
      position:absolute; top:0; left:0; right:0; bottom:0;
      background:rgba(10,14,39,.93); display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:10px; z-index:2;
    }
    .vid-lock .lk-icon { font-size:44px; }
    .vid-lock h3 { font-size:15px; color:white; }
    .vid-lock p  { font-size:12px; color:var(--muted); text-align:center; padding:0 16px; }
    .vid-lock a  { color:var(--accent); font-size:12px; font-weight:700; background:rgba(0,188,212,.1); border:1px solid rgba(0,188,212,.3); padding:7px 18px; border-radius:20px; cursor:pointer; }
    .vid-info { padding:14px 16px; }
    .vid-badge { display:inline-flex; align-items:center; gap:5px; background:rgba(0,188,212,.1); border:1px solid rgba(0,188,212,.3); color:var(--accent); padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; margin-bottom:8px; }
    .vid-title { font-size:15px; font-weight:700; color:white; margin-bottom:7px; line-height:1.4; }
    .vid-desc  { font-size:12px; color:var(--muted); line-height:1.6; margin-bottom:10px; }
    .vid-meta  { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
    .meta-chip { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.09); padding:3px 10px; border-radius:20px; font-size:10px; color:var(--muted); }
    .learn-pts { background:rgba(0,188,212,.05); border:1px solid rgba(0,188,212,.14); border-radius:12px; padding:12px; margin-bottom:12px; }
    .learn-pts h4 { font-size:11px; color:var(--accent); font-weight:700; margin-bottom:8px; text-transform:uppercase; letter-spacing:.5px; }
    .learn-pts ul { list-style:none; display:flex; flex-direction:column; gap:5px; }
    .learn-pts ul li { font-size:12px; color:var(--muted); padding-left:18px; position:relative; }
    .learn-pts ul li::before { content:'✓'; position:absolute; left:0; color:var(--success); font-weight:700; }
    .done-btn { width:100%; padding:13px; border-radius:13px; border:none; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; box-shadow:0 4px 14px rgba(0,188,212,.3); -webkit-tap-highlight-color:transparent; }
    .done-btn.completed { background:rgba(0,230,118,.1); border:1px solid var(--success); color:var(--success); box-shadow:none; cursor:default; }

    /* ── QUIZ ── */
    .score-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px; }
    .score-item { background:var(--card); border:1px solid rgba(255,255,255,.07); border-radius:12px; padding:12px 8px; text-align:center; }
    .score-item .sv { font-size:22px; font-weight:800; color:var(--accent); }
    .score-item .sl { font-size:10px; color:var(--muted); margin-top:2px; text-transform:uppercase; }

    .q-card { background:var(--card); border-radius:18px; padding:18px; border:1px solid rgba(0,188,212,.14); margin-bottom:12px; position:relative; overflow:hidden; }
    .q-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--accent),var(--primary)); }
    .q-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .q-badge2 { background:rgba(0,188,212,.1); border:1px solid rgba(0,188,212,.3); color:var(--accent); padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; }
    .q-prog { font-size:11px; color:var(--muted); }
    .q-text { font-size:14px; font-weight:600; color:white; line-height:1.5; margin-bottom:14px; }
    .opts { display:flex; flex-direction:column; gap:7px; }
    .opt-btn { width:100%; padding:12px 14px; border-radius:11px; border:1.5px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); color:var(--text); font-size:13px; text-align:left; cursor:pointer; display:flex; align-items:center; gap:9px; transition:all .15s; -webkit-tap-highlight-color:transparent; }
    .opt-btn:active:not(:disabled) { border-color:var(--accent); background:rgba(0,188,212,.1); }
    .opt-btn.selected { border-color:var(--accent); background:rgba(0,188,212,.14); color:white; }
    .opt-btn.correct  { border-color:var(--success); background:rgba(0,230,118,.1); color:var(--success); }
    .opt-btn.wrong    { border-color:var(--error);   background:rgba(255,82,82,.1);  color:var(--error); }
    .opt-letter { width:24px; height:24px; border-radius:7px; background:rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }

    .result-card { background:var(--card); border-radius:18px; padding:24px 20px; text-align:center; border:1px solid rgba(0,188,212,.2); margin-bottom:14px; }
    .result-card .re { font-size:52px; margin-bottom:14px; }
    .result-card h2  { font-size:20px; font-weight:800; color:white; margin-bottom:7px; }
    .result-card p   { font-size:13px; color:var(--muted); margin-bottom:16px; line-height:1.6; }
    .res-score { background:linear-gradient(135deg,rgba(0,188,212,.12),rgba(26,35,126,.25)); border:1px solid rgba(0,188,212,.3); border-radius:14px; padding:16px; margin-bottom:16px; }
    .res-score .big  { font-size:44px; font-weight:900; color:var(--accent); }
    .res-score .lbl  { font-size:12px; color:var(--muted); }
    .wrong-list { background:rgba(255,82,82,.06); border:1px solid rgba(255,82,82,.2); border-radius:12px; padding:14px; text-align:left; margin-bottom:14px; }
    .wrong-list h4 { font-size:12px; color:var(--error); font-weight:700; margin-bottom:10px; }
    .wrong-item { padding:8px 0; border-bottom:1px solid rgba(255,255,255,.04); font-size:12px; color:var(--muted); }
    .wrong-item:last-child { border:none; }
    .wrong-item .wq { color:var(--error); font-weight:700; }
    .wrong-item .wa { color:var(--success); margin-top:3px; }
    .act-row { display:flex; flex-direction:column; gap:8px; }
    .act-btn { width:100%; padding:13px; border-radius:13px; border:none; cursor:pointer; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:7px; -webkit-tap-highlight-color:transparent; }
    .btn-retry   { background:rgba(255,82,82,.1);  border:1px solid rgba(255,82,82,.3); color:var(--error); }
    .btn-cont    { background:linear-gradient(135deg,#00e676,#00c853); color:#1a237e; }
    .btn-home    { background:linear-gradient(135deg,#ffd740,#ffc400); color:#1a237e; }

    .locked-msg { text-align:center; padding:32px 20px; background:var(--card); border-radius:18px; border:1px solid rgba(255,255,255,.07); margin-bottom:14px; }
    .locked-msg .lk { font-size:48px; margin-bottom:14px; }
    .locked-msg h3  { font-size:17px; color:white; margin-bottom:7px; }
    .locked-msg p   { font-size:13px; color:var(--muted); line-height:1.6; }
  </style>
</head>
<body>

<!-- ── AR SCENE ──────────────────────────────────────── -->
<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  vr-mode-ui="enabled: false"
  loading-screen="enabled: false"
  renderer="antialias: true; precision: medium"
>
  <a-assets timeout="3000">
    <a-asset-item id="desk-model" src="./models/desk.glb"></a-asset-item>
  </a-assets>
  <a-marker preset="hiro" id="main-marker">
    <a-entity id="desk-group" position="0 0 0">

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function getP() {
  return {
    s1: ls('slides_session_1_done'), s2: ls('slides_session_2_done'), s3: ls('slides_session_3_done'),
    v1: ls('video_session_1_done'),  v2: ls('video_session_2_done'),  v3: ls('video_session_3_done'),
    q1: ls('quiz_session_1_done'),   q2: ls('quiz_session_2_done'),   q3: ls('quiz_session_3_done'),
    slideDone: ls('slides_session_3_done'),
    videoDone: ls('video_session_3_done')
  };
}
function ls(k){ return localStorage.getItem(k) === 'true'; }
function lsSet(k){ localStorage.setItem(k,'true'); }
function lsGet(k){ return localStorage.getItem(k); }
function lsSave(k,v){ localStorage.setItem(k, typeof v==='string'?v:JSON.stringify(v)); }

function updateProgressBar() {
  var p = getP();
  var done = [p.s3, p.v3, p.q3].filter(Boolean).length;
  document.getElementById('progress-fill').style.width = (done/3*100) + '%';
}

function pBar(pct, text) {
  return '<div class="m-progress-wrap"><div class="m-progress-label"><span>Progress</span><span>'+text+'</span></div><div class="m-progress-bar"><div class="m-progress-fill" style="width:'+pct+'%"></div></div></div>';
}

/* ════════════════════════════════════════════════════
   MODAL SYSTEM
════════════════════════════════════════════════════ */
function openModal(id) {
  document.getElementById(id).classList.add('open');
  if (id === 'modal-slides') renderSlides();
  if (id === 'modal-video')  renderVideo();
  if (id === 'modal-quiz')   renderQuiz();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  // Stop YouTube video when closing
  if (id === 'modal-video') {
    document.querySelectorAll('#video-body iframe').forEach(function(f){ f.src = f.src; });
  }
  updateProgressBar();
}

/* ════════════════════════════════════════════════════
   SLIDES MODULE
════════════════════════════════════════════════════ */
var sState = { ses:0, slide:0 };

function slidesUnlocked(i) {
  var p = getP();
  if (i===0) return true;
  if (i===1) return p.s1;
  if (i===2) return p.s2;
  return false;
}

function renderSlides() {
  var p = getP();
  var body = document.getElementById('slides-body');
  var done = [p.s1,p.s2,p.s3].filter(Boolean).length;
  var pct  = Math.round(done/3*100);

  // Tabs
  var tabs = '<div class="m-session-tabs">';
  SESSIONS.forEach(function(s,i){
    var u = slidesUnlocked(i);
    var d = p['s'+(i+1)];
    tabs += '<div class="m-tab'+(i===sState.ses?' active':'')+(u?'':' locked')+'" onclick="slidesSwitchSes('+i+')">';
    tabs += s.icon+' Sesi '+s.id+(d?' ✅':(u?'':' 🔒'))+'</div>';
  });
  tabs += '</div>';

  // Progress
  var prog = pBar(pct, done+'/3 sesi');

  // Current session
  var ses   = SESSIONS[sState.ses];
  var slide = ses.slides[sState.slide];
  var total = ses.slides.length;
  var isLast= sState.slide === total-1;
  var isDone= p['s'+(sState.ses+1)];

  var card = '<div class="slide-card">';
  card += '<div class="slide-badge">'+ses.icon+' Sesi '+ses.id+': '+ses.title+'</div>';
  card += '<div class="slide-num">Slide '+(sState.slide+1)+'/'+total+'</div>';
  card += '<div class="slide-icon">'+slide.icon+'</div>';
  card += '<div class="slide-title">'+slide.title+'</div>';
  card += '<div class="slide-content">'+slide.content+'</div>';
  card += '</div>';

  // Dots
  var dots = '<div class="slide-dots">';
  for(var i=0;i<total;i++){
    dots += '<div class="dot'+(i===sState.slide?' active':'')+'" onclick="slidesGoto('+i+')"></div>';
  }
  dots += '</div>';

  // Nav
  var nav = '<div class="nav-row">';
  if (sState.slide > 0) nav += '<button class="nav-btn btn-prev" onclick="slidesPrev()">← Sebelumnya</button>';
  if (!isLast) {
    nav += '<button class="nav-btn btn-next" onclick="slidesNext()">Berikutnya →</button>';
  } else if (!isDone) {
    nav += '<button class="nav-btn btn-done" onclick="slidesDone()">✅ Selesai Sesi</button>';
  } else {
    if (sState.ses < 2) nav += '<button class="nav-btn btn-next" onclick="slidesSwitchSes('+(sState.ses+1)+')">Sesi Berikutnya →</button>';
    else nav += '<button class="nav-btn btn-done" onclick="openModal(\'modal-video\')">🎬 Lanjut ke Video</button>';
  }
  nav += '</div>';

  body.innerHTML = tabs + prog + card + dots + nav;
}

function slidesSwitchSes(i) {
  if (!slidesUnlocked(i)) { showToast('Selesaikan sesi sebelumnya dulu!'); return; }
  sState.ses = i; sState.slide = 0; renderSlides();
}
function slidesGoto(i) { sState.slide = i; renderSlides(); }
function slidesNext()  { sState.slide++; renderSlides(); }
function slidesPrev()  { sState.slide--; renderSlides(); }
function slidesDone()  {
  lsSet('slides_session_'+(sState.ses+1)+'_done');
  showToast('✅ Sesi '+(sState.ses+1)+' selesai!');
  renderSlides();
}

function videoUnlocked(i) {
  var p = getP();
  if (!p.slideDone) return false;
  if (i===0) return true;
  if (i===1) return p.v1;
  if (i===2) return p.v2;
  return false;
}

function renderVideo() {
  var p    = getP();
  var body = document.getElementById('video-body');
  var done = [p.v1,p.v2,p.v3].filter(Boolean).length;
  var pct  = Math.round(done/3*100);

  // Prerequisite check
  var prereq = '';
  if (!p.slideDone) {
    prereq = '<div class="prereq-box">⚠️ <strong>Selesaikan Slides Dulu!</strong><br>Kamu perlu menyelesaikan semua sesi materi slides sebelum menonton video.<br><a onclick="closeModal(\'modal-video\');openModal(\'modal-slides\')">→ Buka Slides Materi</a></div>';
  }

  // Tabs
  var tabs = '<div class="m-session-tabs">';
  VIDEOS.forEach(function(v,i){
    var u = videoUnlocked(i);
    var d = p['v'+(i+1)];
    tabs += '<div class="m-tab'+(i===vState.ses?' active':'')+(u?'':' locked')+'" onclick="videoSwitchSes('+i+')">';
    tabs += v.icon+' Sesi '+v.id+(d?' ✅':(u?'':' 🔒'))+'</div>';
  });
  tabs += '</div>';

  var prog = pBar(pct, done+'/3 sesi');

  var v  = VIDEOS[vState.ses];
  var u  = videoUnlocked(vState.ses);
  var done2 = p['v'+(vState.ses+1)];

  var vidHtml = '';
  if (u) {
    vidHtml = '<div class="vid-card">';
    vidHtml += '<div class="vid-wrap"><iframe src="https://www.youtube.com/embed/'+v.ytId+'?rel=0&modestbranding=1" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe></div>';
    vidHtml += '<div class="vid-info">';
    vidHtml += '<div class="vid-badge">'+v.icon+' '+v.label+'</div>';
    vidHtml += '<div class="vid-title">'+v.title+'</div>';
    vidHtml += '<div class="vid-meta"><span class="meta-chip">⏱ '+v.dur+'</span><span class="meta-chip">📊 '+v.level+'</span></div>';
    vidHtml += '<div class="vid-desc">'+v.desc+'</div>';
    vidHtml += '<div class="learn-pts"><h4>Yang Akan Dipelajari</h4><ul>'+v.pts.map(function(p){return '<li>'+p+'</li>';}).join('')+'</ul></div>';
    if (!done2) {
      vidHtml += '<button class="done-btn" onclick="videoDone()">✅ Tandai Selesai Menonton</button>';
    } else {
      vidHtml += '<button class="done-btn completed" disabled>✅ Sudah Ditandai Selesai</button>';
      if (vState.ses < 2) vidHtml += '<div style="margin-top:10px"><button class="nav-btn btn-next" style="width:100%" onclick="videoSwitchSes('+(vState.ses+1)+')">Video Berikutnya →</button></div>';
      else vidHtml += '<div style="margin-top:10px"><button class="nav-btn btn-done" style="width:100%" onclick="closeModal(\'modal-video\');openModal(\'modal-quiz\')">🎯 Mulai Kuis →</button></div>';
    }
    vidHtml += '</div></div>';
  } else {
    vidHtml = '<div class="locked-msg"><div class="lk">🔒</div><h3>Video Terkunci</h3><p>'+(p.slideDone?'Selesaikan video sesi sebelumnya untuk membuka sesi ini.':'Selesaikan semua slides terlebih dahulu.')+'</p></div>';
  }

  body.innerHTML = tabs + prog + prereq + vidHtml;
}

function videoSwitchSes(i) {
  if (!videoUnlocked(i)) { showToast(getP().slideDone?'Selesaikan video sebelumnya!':'Selesaikan slides dulu!'); return; }
  vState.ses = i; renderVideo();
}
function videoDone() {
  lsSet('video_session_'+(vState.ses+1)+'_done');
  showToast('✅ Video sesi '+(vState.ses+1)+' selesai!');
  renderVideo();
}

/* ════════════════════════════════════════════════════
   QUIZ MODULE
════════════════════════════════════════════════════ */
var qState = { ses:0, q:0, answers:{}, submitted:false };

function quizUnlocked(i) {
  var p = getP();
  if (!p.videoDone) return false;
  if (i===0) return true;
  if (i===1) return p.q1;
  if (i===2) return p.q2;
  return false;
}

function quizLoadSes() {
  var saved = lsGet('quiz_answers_'+qState.ses);
  qState.answers   = saved ? JSON.parse(saved) : {};
  qState.submitted = ls('quiz_submitted_'+qState.ses);
  qState.q = 0;
}

function renderQuiz() {
  var p    = getP();
  var body = document.getElementById('quiz-body');
  var done = [p.q1,p.q2,p.q3].filter(Boolean).length;
  var pct  = Math.round(done/3*100);

  var prereq = '';
  if (!p.videoDone) {
    prereq = '<div class="prereq-box">⚠️ <strong>Selesaikan Video Dulu!</strong><br>Tonton semua video pembelajaran sebelum mengerjakan kuis.<br><a onclick="closeModal(\'modal-quiz\');openModal(\'modal-video\')">→ Tonton Video</a></div>';
  }

  // Tabs
  var tabs = '<div class="m-session-tabs">';
  QUIZZES.forEach(function(q,i){
    var u = quizUnlocked(i);
    var d = p['q'+(i+1)];
    tabs += '<div class="m-tab'+(i===qState.ses?' active':'')+(u?'':' locked')+'" onclick="quizSwitchSes('+i+')">';
    tabs += q.icon+' Kuis '+q.id+(d?' ✅':(u?'':' 🔒'))+'</div>';
  });
  tabs += '</div>';

  var prog = pBar(pct, done+'/3 kuis');

  var u = quizUnlocked(qState.ses);
  if (!u) {
    body.innerHTML = tabs + prog + prereq + '<div class="locked-msg"><div class="lk">🔒</div><h3>Kuis Terkunci</h3><p>'+(p.videoDone?'Selesaikan kuis sesi sebelumnya dulu.':'Tonton semua video terlebih dahulu.')+'</p></div>';
    return;
  }

  var quiz   = QUIZZES[qState.ses];
  var total  = quiz.questions.length;
  var ansCnt = Object.keys(qState.answers).length;
  var isDone = p['q'+(qState.ses+1)];

  var scoreHtml = '<div class="score-grid"><div class="score-item"><div class="sv">'+ansCnt+'/'+total+'</div><div class="sl">Dijawab</div></div><div class="score-item"><div class="sv">'+(qState.submitted?countCorrect():'-')+'</div><div class="sl">Benar</div></div><div class="score-item"><div class="sv">'+(isDone?'✅':(qState.submitted?'❌':'⏳'))+'</div><div class="sl">Status</div></div></div>';

  // Passed & done
  if (isDone) {
    body.innerHTML = tabs + prog + scoreHtml + '<div class="result-card"><div class="re">🎉</div><h2>Selamat! Kuis Selesai!</h2><p>Kamu telah menguasai Kuis Sesi '+quiz.id+': '+quiz.title+'!</p><div class="res-score"><div class="big" style="color:var(--success)">100%</div><div class="lbl">Semua jawaban benar!</div></div><div class="act-row">'+(qState.ses<2?'<button class="act-btn btn-cont" onclick="quizSwitchSes('+(qState.ses+1)+')">🎯 Kuis Berikutnya →</button>':'<button class="act-btn btn-home" onclick="closeModal(\'modal-quiz\')">🏠 Kembali ke AR</button>')+'</div></div>';
    return;
  }

  // Result after submit
  if (qState.submitted) {
    var correct = countCorrect();
    var passed  = correct === total;
    var wrongItems = getWrongItems();
    if (passed) { lsSet('quiz_session_'+(qState.ses+1)+'_done'); lsSave('quiz_submitted_'+qState.ses,'true'); }
    var wrongHtml = '';
    if (!passed) {
      wrongHtml = '<div class="wrong-list"><h4>❌ Soal yang Salah:</h4>';
      wrongItems.forEach(function(w){ wrongHtml += '<div class="wrong-item"><span class="wq">Soal '+w.num+':</span> '+w.q+'<div class="wa">✓ Jawaban benar: '+w.correct+'</div></div>'; });
      wrongHtml += '</div>';
    }
    body.innerHTML = tabs + prog + scoreHtml + '<div class="result-card"><div class="re">'+(passed?'🎉':'😅')+'</div><h2>'+(passed?'Luar Biasa!':'Hampir Benar!')+'</h2><p>'+(passed?'Semua jawaban benar!':'Kamu mendapat '+correct+'/'+total+'. Semua harus benar. Pelajari kembali soal yang salah!')+'</p><div class="res-score"><div class="big" style="color:'+(passed?'var(--success)':'var(--error)')+'">'+Math.round(correct/total*100)+'%</div><div class="lbl">'+correct+'/'+total+' jawaban benar</div></div>'+wrongHtml+'<div class="act-row">'+(passed?(qState.ses<2?'<button class="act-btn btn-cont" onclick="quizSwitchSes('+(qState.ses+1)+')">🎯 Kuis Berikutnya →</button>':'<button class="act-btn btn-home" onclick="closeModal(\'modal-quiz\')">🏠 Kembali ke AR</button>'):'<button class="act-btn btn-retry" onclick="quizRetry()">🔄 Ulangi Kuis</button>')+'</div></div>';
    if (passed) renderQuiz(); // re-render to show "done" state
    return;
  }

  // Active question
  var qItem = quiz.questions[qState.q];
  var userAns = qState.answers[qState.q];
  var optsHtml = '<div class="opts">';
  qItem.opts.forEach(function(opt,i){
    optsHtml += '<button class="opt-btn'+(userAns===i?' selected':'')+'" onclick="quizSelect('+i+')" id="opt-'+i+'">';
    optsHtml += '<span class="opt-letter">'+['A','B','C','D'][i]+'</span>'+opt+'</button>';
  });
  optsHtml += '</div>';

  var qCard = '<div class="q-card"><div class="q-head"><span class="q-badge2">'+quiz.icon+' Kuis '+quiz.id+'</span><span class="q-prog">Soal '+(qState.q+1)+'/'+total+'</span></div><div class="q-text">'+(qState.q+1)+'. '+qItem.q+'</div>'+optsHtml+'</div>';

  var qnav = '<div class="nav-row">';
  if (qState.q > 0) qnav += '<button class="nav-btn btn-prev" onclick="quizPrev()">← Sebelumnya</button>';
  if (qState.q < total-1) {
    qnav += '<button class="nav-btn btn-next" onclick="quizNext()">Berikutnya →</button>';
  } else {
    var canSubmit = ansCnt >= total;
    qnav += '<button class="nav-btn btn-next'+(canSubmit?'':' btn-disabled')+'" onclick="quizSubmit()" '+(canSubmit?'':'disabled')+'>'+(!canSubmit?'Jawab semua ('+ansCnt+'/'+total+')':'📋 Kumpulkan')+'</button>';
  }
  qnav += '</div>';

  body.innerHTML = tabs + prog + scoreHtml + qCard + qnav;
}

function quizSwitchSes(i) {
  if (!quizUnlocked(i)) { showToast(getP().videoDone?'Selesaikan kuis sebelumnya!':'Selesaikan video dulu!'); return; }
  qState.ses = i; quizLoadSes(); renderQuiz();
}
function quizSelect(i) {
  qState.answers[qState.q] = i;
  lsSave('quiz_answers_'+qState.ses, qState.answers);
  // Update buttons visually without full re-render
  document.querySelectorAll('.opt-btn').forEach(function(b,idx){ b.classList.toggle('selected', idx===i); });
  // Update submit btn
  var total = QUIZZES[qState.ses].questions.length;
  var cnt   = Object.keys(qState.answers).length;
  var btn   = document.querySelector('.nav-row .btn-next');
  if (btn && qState.q === total-1) {
    btn.disabled = cnt < total;
    btn.classList.toggle('btn-disabled', cnt < total);
    btn.textContent = cnt < total ? 'Jawab semua ('+cnt+'/'+total+')' : '📋 Kumpulkan';
  }
  // Update score grid
  var sv = document.querySelector('.score-grid .score-item .sv');
  if (sv) sv.textContent = cnt+'/'+total;
}
function quizNext()  { qState.q++; renderQuiz(); }
function quizPrev()  { qState.q--; renderQuiz(); }
function quizSubmit(){
  var total = QUIZZES[qState.ses].questions.length;
  if (Object.keys(qState.answers).length < total) { showToast('Jawab semua soal dulu!'); return; }
  qState.submitted = true;
  lsSave('quiz_submitted_'+qState.ses, 'true');
  renderQuiz();
}
function quizRetry() {
  qState.answers = {}; qState.submitted = false; qState.q = 0;
  localStorage.removeItem('quiz_answers_'+qState.ses);
  localStorage.removeItem('quiz_submitted_'+qState.ses);
  renderQuiz();
}
function countCorrect() {
  return QUIZZES[qState.ses].questions.filter(function(item,i){ return qState.answers[i]===item.ans; }).length;
}
function getWrongItems() {
  return QUIZZES[qState.ses].questions
    .map(function(item,i){ return { num:i+1, q:item.q, correct:item.opts[item.ans], userAns:qState.answers[i] }; })
    .filter(function(item){ return item.userAns !== QUIZZES[qState.ses].questions[item.num-1].ans; });
}

/* ════════════════════════════════════════════════════
   AR MARKER EVENTS
════════════════════════════════════════════════════ */
var scanHint  = document.getElementById('scan-hint');
var tapZones  = document.getElementById('tap-zones');
var headerSub = document.getElementById('header-sub');

document.getElementById('main-marker').addEventListener('markerFound', function() {
  scanHint.style.display = 'none';
  tapZones.classList.add('active');
  headerSub.textContent = 'Marker terdeteksi ✓';
  showToast('Meja AR muncul! Tap area objek atau tombol di bawah');
});

document.getElementById('main-marker').addEventListener('markerLost', function() {
  tapZones.classList.remove('active');
  scanHint.style.display = '';
  headerSub.textContent = 'Arahkan kamera ke marker Hiro';
});

/* ── TAP ZONE handler ────────────────────────────── */
function tapZone(modalId, e) {
  // Koordinat tap untuk posisi ripple
  var cx = e.touches ? e.touches[0].clientX : e.clientX;
  var cy = e.touches ? e.touches[0].clientY : e.clientY;
  var size = 120;

  var r = document.createElement('div');
  r.className = 'ripple';
  r.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+(cx-size/2)+'px;top:'+(cy-size/2)+'px;';
  document.body.appendChild(r);

  setTimeout(function() {
    r.remove();
    openModal(modalId);
  }, 280);
}

/* ════════════════════════════════════════════════════
   AUTO-NORMALIZE GLB MODELS
   Setiap model di-scale otomatis ke targetSize (unit marker)
   berdasarkan bounding box, lalu diposisikan di atas meja.
════════════════════════════════════════════════════ */
(function() {
  var loadEl = document.getElementById('model-loading');
  var fillEl = document.getElementById('ld-fill');
  console.log('Loading desk model...');

  var deskEl = document.getElementById('ar-desk');

  function hideLoading() {
    if (!loadEl) return;
    loadEl.classList.add('hide');
    setTimeout(function() { loadEl.style.display = 'none'; }, 450);
  }

  if (!deskEl) { hideLoading(); return; }

  /* Rotasi koreksi orientasi model (diterapkan ke mesh, bukan entity).
     Dengan memutar mesh dulu lalu menghitung bbox, centering tetap akurat.
     Ganti nilai ini jika orientasi masih salah:
       -Math.PI/2  (-90°) ← saat ini
        Math.PI/2  (+90°) ← coba jika -90° terbalik
        Math.PI    (180°) ← coba jika hanya perlu dibalik vertikal       */
  var MODEL_ROTATION_X = -Math.PI / 2;

  /* Ukuran target dalam unit marker. Kurangi jika masih terlalu besar. */
  var TARGET_SIZE = 0.8;

  deskEl.addEventListener('model-loaded', function(e) {
    console.log('[DESK] model-loaded event fired ✓');
    if (fillEl) fillEl.style.width = '100%';
    try {
      var model = e.detail.model;

      /* 1. Putar mesh dulu agar bbox yang dihitung sudah dalam
            orientasi final — centering math tidak perlu berubah. */
      model.rotation.x = MODEL_ROTATION_X;
      model.updateMatrixWorld(true);
      console.log('[DESK] rotation applied: x=' + (MODEL_ROTATION_X * 180 / Math.PI).toFixed(0) + '°');

      /* 2. Bounding box SETELAH rotasi */
      var bbox   = new THREE.Box3().setFromObject(model);
      var size   = bbox.getSize(new THREE.Vector3());
      var maxDim = Math.max(size.x, size.y, size.z);

      console.log('[DESK] bbox (post-rotation) — ' +
        size.x.toFixed(3) + 'x' + size.y.toFixed(3) + 'x' + size.z.toFixed(3) +
        ' maxDim:' + maxDim.toFixed(3));
      console.log('[DESK] min — x:' + bbox.min.x.toFixed(3) +
        ' y:' + bbox.min.y.toFixed(3) + ' z:' + bbox.min.z.toFixed(3));
      console.log('[DESK] max — x:' + bbox.max.x.toFixed(3) +
        ' y:' + bbox.max.y.toFixed(3) + ' z:' + bbox.max.z.toFixed(3));

      if (maxDim > 0) {
        /* 3. Scale */
        var sf = TARGET_SIZE / maxDim;
        deskEl.setAttribute('scale', sf + ' ' + sf + ' ' + sf);
        console.log('[DESK] targetSize=' + TARGET_SIZE + '  sf=' + sf.toFixed(6) +
          '  final:' + (size.x*sf).toFixed(3) + 'x' + (size.y*sf).toFixed(3) + 'x' + (size.z*sf).toFixed(3));

        /* 4. Centering: bbox center X/Z → marker origin; min.y → world Y=0 */
        var px = -((bbox.min.x + bbox.max.x) / 2) * sf;
        var py = -bbox.min.y * sf;
        var pz = -((bbox.min.z + bbox.max.z) / 2) * sf;
        deskEl.object3D.position.set(px, py, pz);
        console.log('[DESK] final position — x:' + px.toFixed(4) +
          ' y:' + py.toFixed(4) + ' z:' + pz.toFixed(4));
      } else {
        console.warn('[DESK] maxDim=0 — model kosong atau gagal parse');
      }
    } catch(err) { console.error('[DESK] normalize error:', err); }
    hideLoading();
  });

  deskEl.addEventListener('model-error', function(e) {
    var msg = (e.detail && e.detail.message) ? e.detail.message : JSON.stringify(e.detail);
    console.error('[DESK] model-error: ' + msg);
    deskEl.setAttribute('visible', 'false');
    var fb = document.getElementById('fallback-desk');
    if (fb) { fb.setAttribute('visible', 'true'); console.log('[DESK] fallback primitives shown'); }
    hideLoading();
  });

  /* Timeout: jika 12 detik tidak ada event sama sekali */
  setTimeout(function() {
    console.warn('[DESK] Loading timeout (12s) — no model-loaded or model-error received');
    hideLoading();
  }, 12000);
})();

updateProgressBar();
</script>
